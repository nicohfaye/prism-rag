name: ${COMPOSE_PROJECT_NAME:-prism-rag}

# Usage:
#   docker compose -f docker/docker-compose.yml up -d
#     → Milvus stack only. Use this when you have your own Ollama running on
#       the host (localhost:11434), or when using the `openai` prism profile.
#
#   docker compose -f docker/docker-compose.yml --profile with-ollama up -d
#     → Milvus stack + a containerized Ollama with automatic model preload.
#       Models pulled are controlled by OLLAMA_EMBED_MODEL and OLLAMA_GEN_MODEL
#       (defaults: nomic-embed-text and gpt-oss:20b). Pulling large models
#       blocks the ollama-bootstrap container — follow with `docker compose logs
#       -f ollama-bootstrap` to watch progress.
#
# Teardown:
#   docker compose -f docker/docker-compose.yml down -v --remove-orphans
#   (--remove-orphans is important if the compose file has changed services.)

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.14
    restart: unless-stopped
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: >
      etcd -advertise-client-urls=http://etcd:2379
      -listen-client-urls=http://0.0.0.0:2379 --data-dir=/etcd
    healthcheck:
      test: [ "CMD", "etcdctl", "endpoint", "health" ]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MC_HOST_local: "http://minioadmin:minioadmin@localhost:9000"
    ports:
      # 9001 = web console (useful to inspect what Milvus wrote).
      - "9001:9001"
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  milvus:
    image: milvusdb/milvus:v2.4.10
    restart: unless-stopped
    command: [ "milvus", "run", "standalone" ]
    security_opt:
      # required
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530" # gRPC — pymilvus clients connect here
      - "9091:9091" # health endpoint
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9091/healthz" ]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ─── with-ollama profile: containerized inference + auto model pull ────────
  # Only activates with `--profile with-ollama`. Default stack skips these
  # entirely, so the user's host Ollama (if any) keeps owning port 11434.

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    profiles: [ "with-ollama" ]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      # `ollama list` exits 0 once the server is up and responding.
      test: [ "CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  ollama-bootstrap:
    # One-shot sidecar that pulls the configured models and exits. Lets the
    # user bring the whole stack up with a single command, without shelling
    # into containers to run `ollama pull` by hand.
    image: ollama/ollama:latest
    profiles: [ "with-ollama" ]
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      GEN_MODEL: ${OLLAMA_GEN_MODEL:-gpt-oss:20b}
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        set -e
        echo "pulling embedding model: $$EMBED_MODEL"
        ollama pull "$$EMBED_MODEL"
        echo "pulling generation model: $$GEN_MODEL"
        ollama pull "$$GEN_MODEL"
        echo "done"

volumes:
  etcd_data:
  minio_data:
  milvus_data:
  ollama_data:

